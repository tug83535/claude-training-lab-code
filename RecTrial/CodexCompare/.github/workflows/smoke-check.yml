name: smoke-check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  stage-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run stage smoke script
        run: bash scripts/run_stage_smoke.sh
